<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPR — Hero Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  @font-face {
    font-family: 'Kola';
    src: url('Kola-Regular.woff') format('woff'),
         url('Kola-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --charcoal: #1A1A1C;
    --smoke: #2A2A2C;
    --ivory: #EDE5DA;
    --parchment: #F3EAE0;
    --amber: #D98A2B;
    --golden: #E8A040;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--charcoal);
    color: var(--ivory);
    -webkit-font-smoothing: antialiased;
    margin: 0;
    overflow: hidden;
  }

  /* === FULL HERO === */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Background staircase video */
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .hero-bg video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  /* Gradient overlays */
  .hero-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(26,26,28,0.55) 0%, rgba(26,26,28,0.1) 25%, rgba(26,26,28,0.35) 60%, rgba(26,26,28,0.92) 100%),
      linear-gradient(90deg, rgba(26,26,28,0.65) 0%, transparent 40%, transparent 60%, rgba(26,26,28,0.45) 100%);
  }

  /* Fog layer */
  .hero-fog {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .hero-fog::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: -10%;
    width: 120%;
    height: 40%;
    background: radial-gradient(ellipse 100% 100% at 50% 100%, rgba(237,229,218,0.12) 0%, transparent 70%);
    filter: blur(20px);
  }
  .hero-fog::after {
    content: '';
    position: absolute;
    bottom: 10%;
    right: -5%;
    width: 60%;
    height: 30%;
    background: radial-gradient(ellipse at center, rgba(217,138,43,0.06) 0%, transparent 70%);
    filter: blur(30px);
  }

  /* === NAV BAR === */
  .nav {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    padding: 32px 44px 20px;
    gap: 44px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    height: 36px;
  }

  .nav-logo img {
    height: 32px;
    width: auto;
    display: block;
    filter: brightness(0.93) sepia(0.15) saturate(0.8);
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
    margin-left: 12px;
  }

  .nav-links li {
    position: relative;
  }

  .nav-links a {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(237,229,218,0.7);
    text-decoration: none;
    letter-spacing: 0.03em;
  }

  .nav-links .active a {
    color: var(--ivory);
  }
  .nav-links .active a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    right: 0;
    height: 1.5px;
    background: var(--ivory);
    opacity: 0.6;
  }

  /* === BOTTOM SECTION === */
  .hero-bottom {
    position: relative;
    z-index: 20;
    margin-top: auto;
    padding: 0 44px 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 48px;
  }

  /* Big tagline left */
  .hero-headline h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(52px, 7vw, 88px);
    line-height: 1.02;
    color: var(--ivory);
    text-shadow: 0 2px 30px rgba(26,26,28,0.5);
  }

  /* Entry card right */
  .entry-card {
    background: rgba(26,26,28,0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(237,229,218,0.08);
    padding: 28px 30px;
    max-width: 320px;
    flex-shrink: 0;
    margin-left: auto;
    margin-right: 8%;
  }

  .entry-card h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ivory);
    margin-bottom: 12px;
  }

  .entry-card p {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(237,229,218,0.6);
    margin-bottom: 18px;
  }

  .entry-btn {
    display: inline-block;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    color: var(--charcoal);
    background: var(--ivory);
    padding: 9px 22px 10px;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg">
    <video autoplay muted loop playsinline>
      <source src="staircase-video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-fog"></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-logo">
      <img src="espr-logo-white.png" alt="ESPR">
    </div>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li class="active"><a href="#">Course</a></li>
      <li><a href="#">Events</a></li>
      <li><a href="#">Blog</a></li>
    </ul>
  </nav>

  <!-- Bottom section -->
  <div class="hero-bottom">
    <div class="hero-headline">
      <h1>Beyond the noise.<br>Into the mechanics.</h1>
    </div>
    <div class="entry-card">
      <h2>A space to understand markets, protocols, and mechanisms.</h2>
      <p>Not hot takes. Not hype.<br>The actual economics.</p>
      <a href="#" class="entry-btn">(enter to learn)</a>
    </div>
  </div>
</div>

</body>
</html>
